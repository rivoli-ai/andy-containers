services:
  postgres:
    image: postgres:16-alpine
    container_name: andy-containers-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: andy_containers
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NATS JetStream broker for inter-service messaging (ADR 0001).
  # -js enables JetStream; -m 8222 exposes the HTTP monitoring endpoint
  # used by the healthcheck and for local observability.
  nats:
    image: nats:2-alpine
    container_name: andy-containers-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Andy.Containers.Api/Dockerfile
      additional_contexts:
        certs: ./certs
    container_name: andy-containers-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8443;http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=andy_containers;Username=postgres;Password=postgres
      - AndyAuth__Authority=https://host.docker.internal:${ANDY_AUTH_DOCKER_HTTPS:-7001}
      - AndyAuth__Audience=urn:andy-containers-api
      - AndyAuth__RequireHttpsMetadata=false
      - Rbac__ApiBaseUrl=https://host.docker.internal:${ANDY_RBAC_DOCKER_HTTPS:-7003}
      - Rbac__ApplicationCode=containers
      # andy-settings client wiring (epic rivoli-ai/conductor#771)
      # Port resolved from andy-settings' config/registration.json via
      # ../andy-settings/scripts/generate-docker-ports-env.sh. Fallback is the
      # canonical dockerHttps port; override by sourcing ../andy-settings/dist/docker-ports.env
      # or copying it to .env here. See rivoli-ai/conductor#793.
      - AndySettings__ApiBaseUrl=https://host.docker.internal:${ANDY_SETTINGS_DOCKER_HTTPS:-7300}
      - AndySettings__ApplicationCode=andy-containers
      - Cors__Origins__0=https://localhost:5280
      - Cors__Origins__1=https://localhost:4200
      - Cors__Origins__2=https://localhost:3000
      - Messaging__Provider=Nats
      - Messaging__Nats__Url=nats://nats:4222
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5200:8443"
      - "5201:8080"
      - "4200:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./certs:/usr/local/share/ca-certificates/custom:ro
      - ./images:/app/images:ro
      - ./scripts/container:/app/scripts/container:ro
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Desktop images — build with: docker compose --profile images build
  desktop-dotnet:
    build:
      context: ./images/desktop-dotnet
      additional_contexts:
        scripts: ./scripts/container
    image: andy-desktop-dotnet:latest
    profiles: [images]
    entrypoint: ["true"]

  desktop-python:
    build:
      context: ./images/desktop-python
      additional_contexts:
        scripts: ./scripts/container
    image: andy-desktop-python:latest
    profiles: [images]
    entrypoint: ["true"]

  desktop-alpine-dotnet8:
    build:
      context: ./images/desktop-alpine-dotnet8
      additional_contexts:
        scripts: ./scripts/container
    image: andy-desktop-alpine-dotnet8:latest
    profiles: [images]
    entrypoint: ["true"]

  desktop-alpine-dotnet10:
    build:
      context: ./images/desktop-alpine-dotnet10
      additional_contexts:
        scripts: ./scripts/container
    image: andy-desktop-alpine-dotnet10:latest
    profiles: [images]
    entrypoint: ["true"]

volumes:
  postgres_data:
  dataprotection_keys:
  nats_data:
