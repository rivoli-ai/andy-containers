services:
  postgres:
    image: postgres:16-alpine
    container_name: andy-containers-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: andy_containers
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Andy.Containers.Api/Dockerfile
      additional_contexts:
        certs: ./certs
    container_name: andy-containers-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8443;http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=andy_containers;Username=postgres;Password=postgres
      - AndyAuth__Authority=https://host.docker.internal:5001
      - AndyAuth__Audience=urn:andy-containers-api
      - Rbac__ApiBaseUrl=https://host.docker.internal:7003
      - Rbac__ApplicationCode=containers
      - Cors__Origins__0=https://localhost:5280
      - Cors__Origins__1=https://localhost:4200
      - Cors__Origins__2=https://localhost:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5200:8443"
      - "5201:8080"
    volumes:
      - ./certs:/usr/local/share/ca-certificates/custom:ro
      # Optional: mount a real cert to override the built-in self-signed one
      # - ${HOME}/.aspnet/https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./src/andy-containers-web
      dockerfile: Dockerfile
    container_name: andy-containers-web
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data:
