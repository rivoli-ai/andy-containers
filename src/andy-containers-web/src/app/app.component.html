<!-- Mobile sidebar overlay -->
<div
  *ngIf="sidebarOpen"
  class="fixed inset-0 bg-black/50 z-40 lg:hidden"
  (click)="toggleSidebar()"
></div>

<!-- Sidebar — light theme matching RBAC -->
<aside
  class="fixed top-0 left-0 z-50 h-full w-[280px] bg-white dark:bg-surface-900 border-r border-surface-200 dark:border-surface-700 transform transition-transform duration-300 ease-in-out lg:translate-x-0 flex flex-col"
  [class.-translate-x-full]="!sidebarOpen"
  [class.translate-x-0]="sidebarOpen"
>
  <!-- Sidebar header -->
  <div class="flex items-center h-16 px-5 border-b border-surface-200 dark:border-surface-700">
    <a routerLink="/dashboard" class="flex items-center gap-3 no-underline">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-primary-500">
        <rect x="4" y="4" width="24" height="24" rx="6" stroke="currentColor" stroke-width="2"/>
        <rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="17" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="9" y="17" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="17" y="17" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="text-xl font-semibold text-primary-500 tracking-tight">Andy Containers</span>
    </a>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 overflow-y-auto py-4 px-3">
    <!-- Overview section -->
    <div class="mb-6">
      <div class="px-4 mb-2 text-xs font-semibold uppercase tracking-wider text-surface-400 dark:text-surface-500">Overview</div>
      <a
        routerLink="/dashboard"
        routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-500 dark:text-primary-400"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-4 py-2.5 text-base font-medium text-surface-500 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-md transition-all mb-0.5"
        (click)="sidebarOpen = false"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flex-shrink-0">
          <rect x="2" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="10" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="2" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="10" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Dashboard</span>
      </a>
    </div>

    <!-- Resources section -->
    <div class="mb-6">
      <div class="px-4 mb-2 text-xs font-semibold uppercase tracking-wider text-surface-400 dark:text-surface-500">Resources</div>
      <a
        routerLink="/containers"
        routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-500 dark:text-primary-400"
        class="flex items-center gap-3 px-4 py-2.5 text-base font-medium text-surface-500 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-md transition-all mb-0.5"
        (click)="sidebarOpen = false"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flex-shrink-0">
          <rect x="2" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 7h2M5 10h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Containers</span>
      </a>
      <a
        routerLink="/templates"
        routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-500 dark:text-primary-400"
        class="flex items-center gap-3 px-4 py-2.5 text-base font-medium text-surface-500 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-md transition-all mb-0.5"
        (click)="sidebarOpen = false"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flex-shrink-0">
          <rect x="3" y="2" width="12" height="14" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 6h6M6 9h6M6 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Templates</span>
      </a>
      <a
        routerLink="/workspaces"
        routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-500 dark:text-primary-400"
        class="flex items-center gap-3 px-4 py-2.5 text-base font-medium text-surface-500 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-md transition-all mb-0.5"
        (click)="sidebarOpen = false"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flex-shrink-0">
          <path d="M2 5a2 2 0 012-2h4l2 2h4a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V5z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Workspaces</span>
      </a>
    </div>

    <!-- Infrastructure section -->
    <div class="mb-6">
      <div class="px-4 mb-2 text-xs font-semibold uppercase tracking-wider text-surface-400 dark:text-surface-500">Infrastructure</div>
      <a
        routerLink="/providers"
        routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-500 dark:text-primary-400"
        class="flex items-center gap-3 px-4 py-2.5 text-base font-medium text-surface-500 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-md transition-all mb-0.5"
        (click)="sidebarOpen = false"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flex-shrink-0">
          <path d="M3 6a3 3 0 013-3h6a3 3 0 013 3v0a3 3 0 01-3 3H6a3 3 0 01-3-3v0z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3 12a3 3 0 013-3h6a3 3 0 013 3v0a3 3 0 01-3 3H6a3 3 0 01-3-3v0z" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="6" cy="6" r="1" fill="currentColor"/>
          <circle cx="6" cy="12" r="1" fill="currentColor"/>
        </svg>
        <span>Providers</span>
      </a>
    </div>

    <!-- Help section -->
    <div class="mb-6">
      <div class="px-4 mb-2 text-xs font-semibold uppercase tracking-wider text-surface-400 dark:text-surface-500">Help</div>
      <a
        routerLink="/docs"
        routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-500 dark:text-primary-400"
        class="flex items-center gap-3 px-4 py-2.5 text-base font-medium text-surface-500 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-md transition-all mb-0.5"
        (click)="sidebarOpen = false"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flex-shrink-0">
          <path d="M3 2h12a1 1 0 011 1v12a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 6h8M5 9h8M5 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Documentation</span>
      </a>
    </div>

    <!-- Account section -->
    <div class="mb-6">
      <div class="px-4 mb-2 text-xs font-semibold uppercase tracking-wider text-surface-400 dark:text-surface-500">Account</div>
      <a
        routerLink="/settings"
        routerLinkActive="bg-primary-50 dark:bg-primary-900/20 text-primary-500 dark:text-primary-400"
        class="flex items-center gap-3 px-4 py-2.5 text-base font-medium text-surface-500 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-md transition-all mb-0.5"
        (click)="sidebarOpen = false"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flex-shrink-0">
          <path d="M7.5 2.25h3l.45 1.8.9.45 1.65-.9 2.1 2.1-.9 1.65.45.9 1.8.45v3l-1.8.45-.45.9.9 1.65-2.1 2.1-1.65-.9-.9.45-.45 1.8h-3l-.45-1.8-.9-.45-1.65.9-2.1-2.1.9-1.65-.45-.9-1.8-.45v-3l1.8-.45.45-.9-.9-1.65 2.1-2.1 1.65.9.9-.45.45-1.8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Settings</span>
      </a>
    </div>
  </nav>

  <!-- Sidebar footer - User info & sign out -->
  <div class="px-5 py-4 border-t border-surface-200 dark:border-surface-700 mt-auto">
    <div *ngIf="auth.isAuthenticated()" class="mb-3">
      <div class="flex items-center gap-2.5 mb-3">
        <svg class="w-8 h-8 text-primary-500 shrink-0" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <div class="min-w-0">
          <p class="text-sm font-medium text-surface-700 dark:text-surface-200 truncate">{{ auth.getUserName() || 'User' }}</p>
          <p class="text-xs text-surface-400 truncate">{{ auth.getUserEmail() }}</p>
        </div>
      </div>
      <button (click)="auth.signOut()"
        class="w-full flex items-center justify-center gap-2 px-3 py-2 text-sm font-medium rounded-lg border border-surface-300 dark:border-surface-600 text-surface-600 dark:text-surface-300 bg-white dark:bg-surface-800 hover:bg-surface-50 dark:hover:bg-surface-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </button>
    </div>
    <p class="text-xs text-surface-400 text-center">Andy Containers v0.1.0-alpha</p>
  </div>
</aside>

<!-- Main layout -->
<div class="lg:ml-[280px] min-h-screen">
  <!-- Top header bar — light theme matching RBAC -->
  <header class="sticky top-0 z-30 flex items-center justify-between h-16 px-6 bg-white dark:bg-surface-800 border-b border-surface-200 dark:border-surface-700">
    <!-- Hamburger (mobile only) -->
    <button
      class="lg:hidden btn-icon text-surface-600 dark:text-white"
      (click)="toggleSidebar()"
      aria-label="Toggle sidebar"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <div class="flex-1"></div>

    <!-- Theme toggle -->
    <button
      class="btn-icon text-surface-400 hover:text-surface-700 dark:text-surface-400 dark:hover:text-white"
      (click)="toggleDarkMode()"
      aria-label="Toggle dark mode"
    >
      <svg *ngIf="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
      <svg *ngIf="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    </button>
  </header>

  <!-- Main content -->
  <main class="p-8 max-w-[1400px] animate-fade-in">
    <router-outlet />
  </main>
</div>
