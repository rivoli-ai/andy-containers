<!-- Mobile sidebar overlay -->
<div
  *ngIf="sidebarOpen"
  class="fixed inset-0 bg-black/50 z-40 lg:hidden"
  (click)="toggleSidebar()"
></div>

<!-- Sidebar -->
<aside
  class="fixed top-0 left-0 z-50 h-full w-64 bg-surface-900 text-white transform transition-transform duration-200 ease-in-out lg:translate-x-0"
  [class.-translate-x-full]="!sidebarOpen"
  [class.translate-x-0]="sidebarOpen"
>
  <!-- Sidebar header -->
  <div class="flex items-center h-14 px-4 bg-surface-800 border-b border-surface-700">
    <span class="text-lg font-semibold tracking-tight">Andy Containers</span>
  </div>

  <!-- Nav links -->
  <nav class="mt-4 px-3 space-y-1">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-primary-600/20 text-primary-400 border-l-2 border-primary-400"
        class="flex items-center gap-3 px-3 py-2.5 text-sm text-surface-300 hover:text-white hover:bg-surface-800 rounded-lg transition-colors"
        (click)="sidebarOpen = false"
      >
        <span class="text-lg">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</aside>

<!-- Main layout -->
<div class="lg:ml-64 min-h-screen">
  <!-- Top header bar -->
  <header class="sticky top-0 z-30 flex items-center justify-between h-14 px-4 bg-surface-800 border-b border-surface-700 text-white">
    <!-- Hamburger (mobile only) -->
    <button
      class="lg:hidden btn-icon text-white"
      (click)="toggleSidebar()"
      aria-label="Toggle sidebar"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <span class="text-lg font-semibold lg:hidden">Andy Containers</span>

    <div class="flex-1 lg:block hidden"></div>

    <!-- Theme toggle -->
    <button
      class="btn-icon text-surface-300 hover:text-white"
      (click)="toggleDarkMode()"
      aria-label="Toggle dark mode"
    >
      <svg *ngIf="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
      <svg *ngIf="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    </button>
  </header>

  <!-- Main content -->
  <main class="p-6 animate-fade-in">
    <router-outlet />
  </main>
</div>
