server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx starts even if backend is temporarily down
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Angular routing — always fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls to backend (HTTPS)
    location /api {
        set $backend https://andy-containers-api:8443;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_verify off;
    }

    # Proxy WebSocket terminal connections
    location /api/containers/ {
        set $backend https://andy-containers-api:8443;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_ssl_verify off;
        proxy_read_timeout 86400;
    }
}
