# Conductor invisible-tmux config (#875).
#
# The container terminal session wraps `bash -i` in tmux so the
# screen state survives WebSocket reconnects, but tmux is configured
# to render exactly like a bare bash — no status bar, no prefix
# key, no keybindings, native ANSI passthrough. The user perceives
# a plain bash; tmux is doing the state-keeping invisibly.
#
# Image build: each desktop Dockerfile copies this to
# /etc/conductor-tmux.conf via `COPY --from=scripts ...`. Older
# containers without /etc/conductor-tmux.conf fall back to a
# lazy-create at $HOME/.config/conductor/tmux.conf — see
# TerminalController.BuildContainerShellCommand.

# No status bar. The whole point of "invisible tmux".
set -g status off

# No prefix key. Tmux's default Ctrl-B captures keystrokes meant
# for the inner program (vim, claude code, htop). Setting prefix
# to "none" disables capture entirely.
set -g prefix none

# Drop every default keybinding. Without prefix the bindings are
# unreachable anyway, but explicit unbind keeps it that way even
# if a user later sets a prefix in their own ~/.tmux.conf.
unbind-key -a

# When the daemon-PTY's SIGWINCH lands and tmux's outer client
# resizes, propagate to the inner window. Without this, the inner
# bash stays at the old size and TUI apps draw at the wrong width.
setw -g aggressive-resize on

# What tmux advertises in $TERM to the inner shell. xterm-256color
# is what claude code / vim / less expect.
set -g default-terminal "xterm-256color"

# Inner shell. We exec `bash -i` directly via new-session so this
# is mostly belt-and-suspenders, but it pins the choice for any
# attach that doesn't pass an explicit command.
set -g default-shell "/bin/bash"

# Scrollback buffer. 10 000 lines is the floor we promise so
# reconnect-and-look-up-history doesn't lose real work.
set -g history-limit 10000
