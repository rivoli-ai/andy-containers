code: full-stack
name: Full Stack Development
description: Complete development environment with .NET 8, Python 3.12, Node.js 20, and Angular 18
version: "1.0.0"
base_image: ubuntu:24.04
catalog_scope: global
ide_type: code-server

gpu:
  required: false
  preferred: false

resources:
  cpu_cores: 4
  memory_mb: 8192
  disk_gb: 40

dependencies:
  - type: sdk
    name: dotnet-sdk
    version: "8.0.*"
    auto_update: true
    update_policy: patch

  - type: runtime
    name: python
    version: ">=3.12,<4.0"
    auto_update: true
    update_policy: minor

  - type: tool
    name: node
    version: "20.x"
    auto_update: true
    update_policy: minor

  - type: tool
    name: angular-cli
    version: "latest"
    auto_update: true
    update_policy: major

  - type: tool
    name: git
    version: "latest"
    auto_update: true
    update_policy: patch

  - type: tool
    name: code-server
    version: "latest"
    auto_update: true
    update_policy: minor

environment:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  NODE_ENV: development

ports:
  8080: code-server
  3000: angular-dev-server
  5000: dotnet-api

scripts:
  init: |
    git config --global init.defaultBranch main
  setup: |
    echo "Container ready"

tags:
  - dotnet
  - python
  - node
  - angular
  - full-stack
